name: Update Graph Data

on:
  schedule:
    - cron: '30 14 * * *'  # JST 23:30 (UTC 14:30)
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data & update graph.html
        run: node update.js

      - name: Encrypt HTML files with password
        env:
          STATICRYPT_PASSWORD: ${{ secrets.GRAPH_PASSWORD }}
        run: |
          npx staticrypt@3 graph.html \
            --password "$STATICRYPT_PASSWORD" \
            --directory . \
            --short \
            --remember 365 \
            --template-button "認証" \
            --template-title "メッセ三鷹 データ" \
            --template-instructions "パスワードを入力してください"
          npx staticrypt@3 predictions.html \
            --password "$STATICRYPT_PASSWORD" \
            --directory . \
            --short \
            --remember 365 \
            --template-button "認証" \
            --template-title "メッセ三鷹 予測履歴" \
            --template-instructions "パスワードを入力してください"
          # Remember me チェックボックスをデフォルトでオンにする
          node -e "
            const fs = require('fs');
            ['graph.html','predictions.html'].forEach(f => {
              if (!fs.existsSync(f)) return;
              let html = fs.readFileSync(f, 'utf8');
              html = html.replace(
                /(<input[^>]+id=[\"']staticrypt-remember[\"'][^>]*)(>)/,
                '\$1 checked\$2'
              );
              fs.writeFileSync(f, html);
            });
          "

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graph.html predictions.html prediction_history.json graph_data.json graph_data_*.json
          git add units.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update graph data $(date +'%Y-%m-%d')"
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
