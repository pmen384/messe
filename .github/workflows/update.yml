name: Encrypt & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'history.json'        # さくらサーバーからの push のみ反応
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  encrypt:
    # github-actions[bot] 自身の push ではループしないようスキップ
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt HTML files with password
        env:
          STATICRYPT_PASSWORD: ${{ secrets.GRAPH_PASSWORD }}
        run: |
          npx staticrypt@3 graph.html \
            --password "$STATICRYPT_PASSWORD" \
            --directory . \
            --short \
            --remember 365 \
            --template-button "認証" \
            --template-title "メッセ三鷹 データ" \
            --template-instructions "パスワードを入力してください"
          npx staticrypt@3 predictions.html \
            --password "$STATICRYPT_PASSWORD" \
            --directory . \
            --short \
            --remember 365 \
            --template-button "認証" \
            --template-title "メッセ三鷹 予測履歴" \
            --template-instructions "パスワードを入力してください"
          npx staticrypt@3 index.html \
            --password "$STATICRYPT_PASSWORD" \
            --directory . \
            --short \
            --remember 365 \
            --template-button "認証" \
            --template-title "メッセ三鷹" \
            --template-instructions "パスワードを入力してください"
          # Remember me チェックボックスをデフォルトでオンにする
          node -e "
            const fs = require('fs');
            ['graph.html','predictions.html','index.html'].forEach(f => {
              if (!fs.existsSync(f)) return;
              let html = fs.readFileSync(f, 'utf8');
              html = html.replace(
                /(<input[^>]+id=[\"']staticrypt-remember[\"'][^>]*)(>)/,
                '\$1 checked\$2'
              );
              fs.writeFileSync(f, html);
            });
          "

      - name: Commit encrypted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graph.html predictions.html index.html
          git diff --staged --quiet || git commit -m "chore: encrypt HTML $(date +'%Y-%m-%d')"
          git push

  deploy:
    needs: encrypt
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
