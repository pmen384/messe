<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>メッセ三鷹 e牙狼12 XX-MJ 持ち玉推移</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
    }

    h1 { font-size: 18px; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }

    .toolbar {
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: center; margin-bottom: 14px;
    }
    .toolbar label { font-size: 12px; color: #888; }

    .span-btns { display: flex; gap: 4px; }
    .span-btn {
      padding: 5px 16px; border-radius: 6px;
      border: 1px solid #2e3148; background: #1e2130;
      color: #888; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .span-btn.active { background: #3a4fd4; border-color: #3a4fd4; color: #fff; }
    .span-btn:hover:not(.active) { background: #262a3e; color: #ccc; }

    .btn {
      padding: 5px 12px; border-radius: 6px;
      border: 1px solid #2e3148; background: #1e2130;
      color: #ccc; font-size: 12px; cursor: pointer;
    }
    .btn:hover { background: #262a3e; color: #fff; }

    .unit-toggles {
      display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px;
    }
    .unit-btn {
      padding: 3px 10px; border-radius: 14px; border: 2px solid;
      font-size: 11px; font-weight: 700; cursor: pointer;
      background: transparent; opacity: 0.3; transition: opacity 0.15s;
    }
    .unit-btn.active { opacity: 1; }

    .chart-box {
      background: #1a1d2e; border: 1px solid #2a2d3e;
      border-radius: 12px; padding: 16px; margin-bottom: 20px;
      position: relative; height: 420px;
    }

    .ranking {
      background: #1a1d2e; border: 1px solid #2a2d3e;
      border-radius: 12px; padding: 18px;
    }
    .ranking h2 { font-size: 14px; color: #bbb; margin-bottom: 12px; }
    .rank-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 5px;
    }
    .rank-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px; border-radius: 6px;
      background: #0d0f1a; cursor: pointer; font-size: 12px;
    }
    .rank-row:hover { background: #1e2130; }
    .rank-num { width: 20px; text-align: right; color: #444; font-size: 11px; }
    .rank-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .rank-unit { width: 36px; font-weight: 700; }
    .rank-bar-wrap { flex: 1; height: 5px; background: #1e2235; border-radius: 3px; overflow: hidden; }
    .rank-bar { height: 100%; border-radius: 3px; }
    .rank-val { width: 80px; text-align: right; font-weight: 700; font-size: 12px; }

    .prediction {
      background: #1a1d2e; border: 1px solid #2a2d3e;
      border-radius: 12px; padding: 18px; margin-top: 20px;
    }
    .prediction-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
    }
    .prediction-header h2 { font-size: 14px; color: #bbb; font-weight: 600; }
    .prediction-note { font-size: 11px; color: #444; margin-bottom: 14px; }
    .pred-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 8px;
    }
    .pred-card {
      background: #0d0f1a; border-radius: 10px; padding: 12px 14px;
      border: 1px solid transparent; transition: border-color 0.2s;
    }
    .pred-card.hot { border-color: #ff5252; }
    .pred-card.warm { border-color: #ff9800; }
    .pred-card.cold { border-color: #2e3148; }
    .pred-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .pred-badge {
      font-size: 10px; font-weight: 700; padding: 2px 7px;
      border-radius: 10px; white-space: nowrap;
    }
    .pred-badge.hot { background: #ff525230; color: #ff5252; }
    .pred-badge.warm { background: #ff980030; color: #ff9800; }
    .pred-badge.cold { background: #2e314880; color: #666; }
    .pred-unit { font-size: 15px; font-weight: 700; }
    .pred-score {
      margin-left: auto; font-size: 12px; font-weight: 700;
    }
    .pred-rows { font-size: 11px; color: #666; display: flex; flex-direction: column; gap: 3px; }
    .pred-row { display: flex; justify-content: space-between; }
    .pred-row span:last-child { color: #999; }
    .pred-reason {
      margin-top: 8px; font-size: 11px; padding: 5px 8px;
      background: #12141f; border-radius: 6px; color: #888; line-height: 1.5;
    }
  </style>

const COLORS = [
  '#FF5252','#FF9800','#FFEB3B','#69F0AE','#40C4FF',
  '#E040FB','#F06292','#AED581','#4DD0E1','#FFD740',

  '#82B1FF','#EEFF41'
];

const ALL_DATES = [...new Set(
  GRAPH_DATA.flatMap(u => Object.keys(u.days))
)].sort();
const LAST_DATE = ALL_DATES[ALL_DATES.length - 1];

document.getElementById('subtitle').textContent =
  `データ範囲: ${ALL_DATES[0]} ～ ${LAST_DATE}`;

let currentSpan = 'day';
let activeUnits = new Set(GRAPH_DATA.map(d => d.unit));

function getFilteredDates(span) {
  const last = new Date(LAST_DATE);
  if (span === 'day') return [LAST_DATE];
  const days = span === 'week' ? 6 : 29;
  const cutoff = new Date(last.getTime() - days * 86400000).toISOString().slice(0, 10);
  return ALL_DATES.filter(d => d >= cutoff);
}

function buildChartData(span) {
  const dates = getFilteredDates(span);
  const dayMaxLen = {};
  for (const date of dates) {
    dayMaxLen[date] = Math.max(...GRAPH_DATA.map(u => (u.days[date] || []).length), 1);
  }

  const labels = [];
  const dayBoundaries = [];
  let offset = 0;
  for (const date of dates) {
    const len = dayMaxLen[date];
    for (let i = 0; i < len; i++) {
      if (i === 0) {
        dayBoundaries.push(offset);
        labels.push(span === 'day' ? String(i + 1) : date.slice(5));
      } else {
        labels.push('');
      }
      offset++;
    }
  }

  const datasets = GRAPH_DATA.map((u, i) => {
    const values = [];
    let cumOffset = 0; // 前日終値を次の日の起点に加算

    for (const date of dates) {
      const pts = u.days[date] || [];
      const maxLen = dayMaxLen[date];
      for (let j = 0; j < maxLen; j++) {
        values.push(j < pts.length ? pts[j] + cumOffset : null);
      }
      // 次の日のオフセット = 当日の終値（1日表示は不要）
      if (span !== 'day' && pts.length > 0) {
        cumOffset += pts[pts.length - 1];
      }
    }
    return {
      label: `台${u.unit}`,
      data: values,
      borderColor: COLORS[i % COLORS.length],
      borderWidth: 1.5,
      pointRadius: 0,
      pointHoverRadius: 5,
      pointHoverBackgroundColor: COLORS[i % COLORS.length],
      tension: 0.3,
      fill: false,
      hidden: !activeUnits.has(u.unit),
      spanGaps: true,
    };
  });

  return { labels, datasets, dayBoundaries };
}

let currentBoundaries = [];
const sepPlugin = {
  id: 'sep',
  afterDraw(chart) {
    if (currentSpan === 'day') return;
    const { ctx, chartArea: ca, scales } = chart;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    currentBoundaries.slice(1).forEach(i => {
      const x = scales.x.getPixelForTick(i);
      if (!x) return;
      ctx.beginPath(); ctx.moveTo(x, ca.top); ctx.lineTo(x, ca.bottom); ctx.stroke();
    });
    ctx.restore();
  }
};

const ctx2d = document.getElementById('mainChart').getContext('2d');
const chart = new Chart(ctx2d, {
  type: 'line',
  plugins: [sepPlugin],
  data: { labels: [], datasets: [] },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 200 },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1e2130',
        titleColor: '#fff',
        bodyColor: '#ccc',
        borderColor: '#2e3148',
        borderWidth: 1,
        padding: 10,
        callbacks: {
          label: item => {
            if (item.dataset.hidden || item.parsed.y === null) return null;
            const v = item.parsed.y;
            return ` ${item.dataset.label}:  ${v >= 0 ? '+' : ''}${v.toLocaleString()}玉`;
          },
          labelColor: item => ({
            borderColor: item.dataset.borderColor,
            backgroundColor: item.dataset.borderColor,
          })
        },

          callback: v => (v >= 0 ? '+' : '') + v.toLocaleString(),
        },
        grid: { color: '#1a1d2a' },
      }
    }
  }
});

function redraw() {
  const { labels, datasets, dayBoundaries } = buildChartData(currentSpan);
  currentBoundaries = dayBoundaries;
  chart.data.labels = labels;
  chart.data.datasets = datasets;
  chart.update();
  renderRanking();
}

function finalVal(u) {
  const dates = getFilteredDates(currentSpan);
  if (currentSpan === 'day') {
    // 1日: 当日の最終値
    const pts = u.days[dates[0]];
    return pts && pts.length > 0 ? pts[pts.length - 1] : 0;
  }
  // 複数日: 各日の終値を累積合算
  return dates.reduce((sum, date) => {
    const pts = u.days[date];
    return sum + (pts && pts.length > 0 ? pts[pts.length - 1] : 0);
  }, 0);
}

function renderRanking() {
  const sorted = GRAPH_DATA
    .map((u, i) => ({ unit: u.unit, idx: i, v: finalVal(u) }))
    .sort((a, b) => b.v - a.v);
  const maxAbs = Math.max(...sorted.map(s => Math.abs(s.v)), 1);
  document.getElementById('rankList').innerHTML = sorted.map((s, rank) => {
    const c = COLORS[s.idx % COLORS.length];
    const bc = s.v >= 0 ? c : '#ff4444';
    const pct = (Math.abs(s.v) / maxAbs * 100).toFixed(1);
    const sign = s.v >= 0 ? '+' : '';
    return `<div class="rank-row" onclick="toggleUnit(${s.unit})">
      <div class="rank-num">${rank + 1}</div>
      <div class="rank-dot" style="background:${c}"></div>
      <div class="rank-unit" style="color:${c}">台${s.unit}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%;background:${bc}"></div></div>
      <div class="rank-val" style="color:${bc}">${sign}${s.v.toLocaleString()}</div>
    </div>`;
  }).join('');
}

GRAPH_DATA.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'unit-btn active';
  btn.textContent = `台${d.unit}`;
  btn.style.borderColor = COLORS[i % COLORS.length];
  btn.style.color = COLORS[i % COLORS.length];
  btn.addEventListener('click', () => toggleUnit(d.unit));
  document.getElementById('unitToggles').appendChild(btn);
});

function toggleUnit(unit) {
  const i = GRAPH_DATA.findIndex(d => d.unit === unit);
  const btn = document.querySelectorAll('.unit-btn')[i];
  if (activeUnits.has(unit)) { activeUnits.delete(unit); btn.classList.remove('active'); }
  else { activeUnits.add(unit); btn.classList.add('active'); }
  redraw();
}

function setUnits(units) {
  activeUnits = new Set(units);
  document.querySelectorAll('.unit-btn').forEach((btn, i) => {
    btn.classList.toggle('active', activeUnits.has(GRAPH_DATA[i].unit));
  });
  redraw();
}

document.querySelectorAll('.span-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.span-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSpan = btn.dataset.span;
    redraw();
  });
});

document.getElementById('btnNone').addEventListener('click', () => setUnits([]));

function calcPrediction() {
  const sortedDates = ALL_DATES.slice().sort();
  const recentDates = sortedDates.slice(-7); // 直近7日

  return GRAPH_DATA.map((u, idx) => {
    const dayResults = sortedDates.map(date => {
      const pts = u.days[date];
      if (!pts || pts.length === 0) return null;
      return pts[pts.length - 1]; // 各日終値
    }).filter(v => v !== null);

    if (dayResults.length === 0) return null;

    // 直近7日の終値
    const recentResults = recentDates.map(date => {
      const pts = u.days[date];
      return pts && pts.length > 0 ? pts[pts.length - 1] : null;
    }).filter(v => v !== null);

    const totalDays = dayResults.length;
    const avgDaily   = dayResults.reduce((s, v) => s + v, 0) / totalDays;
    const recentAvg  = recentResults.length > 0
      ? recentResults.reduce((s, v) => s + v, 0) / recentResults.length : avgDaily;

    // 連続マイナス日数（直近から遡る）
    let consecutiveLoss = 0;
    for (let i = recentDates.length - 1; i >= 0; i--) {
      const pts = u.days[recentDates[i]];
      const v = pts && pts.length > 0 ? pts[pts.length - 1] : null;
      if (v === null) break;
      if (v < 0) consecutiveLoss++; else break;
    }

    // 直近の累積赤字額
    const recentCumLoss = recentResults.reduce((s, v) => s + Math.min(v, 0), 0);

    // スコア計算（高いほど「出やすい」予測）
    // ・連続マイナス日数が多い → 高スコア
    // ・直近の累積損失が大きい → 高スコア
    // ・全体平均がマイナス → 高スコア
    const score =
      consecutiveLoss * 20
      + Math.max(0, -recentCumLoss) / 1000
      + Math.max(0, -avgDaily) / 500;

    // 直近7日の勝ち/負け
    const wins   = recentResults.filter(v => v > 0).length;
    const losses = recentResults.filter(v => v < 0).length;

    return {
      unit: u.unit,
      color: COLORS[idx % COLORS.length],
      score: Math.round(score * 10) / 10,
      consecutiveLoss,
      recentAvg: Math.round(recentAvg),
      recentCumLoss: Math.round(recentCumLoss),
      totalDays,
      wins,
      losses,
      avgDaily: Math.round(avgDaily),
    };
  }).filter(Boolean).sort((a, b) => b.score - a.score);
}

function renderPrediction() {
  const preds = calcPrediction();
  const maxScore = preds[0]?.score || 1;

  const grid = document.getElementById('predGrid');
  grid.innerHTML = preds.slice(0, 9).map((p, rank) => {
    const tier = rank < 3 ? 'hot' : rank < 6 ? 'warm' : 'cold';
    const tierLabel = rank < 3 ? '🔥 注目' : rank < 6 ? '👀 要確認' : '❄️ 様子見';
    const scorePct = (p.score / maxScore * 100).toFixed(0);

    const reasons = [];
    if (p.consecutiveLoss >= 3) reasons.push(`${p.consecutiveLoss}日連続マイナス`);
    if (p.recentCumLoss < -20000) reasons.push(`直近累積 ${p.recentCumLoss.toLocaleString()}玉`);
    if (p.recentAvg < -5000) reasons.push(`直近平均 ${p.recentAvg.toLocaleString()}玉/日`);
    if (p.losses >= 5) reasons.push(`直近${p.losses}勝負中${p.losses}負`);

    return `
      <div class="pred-card ${tier}">
        <div class="pred-top">
          <span class="pred-badge ${tier}">${tierLabel}</span>
          <span class="pred-unit" style="color:${p.color}">台${p.unit}</span>
          <span class="pred-score" style="color:${tier==='hot'?'#ff5252':tier==='warm'?'#ff9800':'#555'}">
            スコア ${scorePct}
          </span>
        </div>
        <div class="pred-rows">
          <div class="pred-row"><span>連続マイナス日数</span><span>${p.consecutiveLoss}日</span></div>
          <div class="pred-row"><span>直近7日 勝/負</span><span>${p.wins}勝 ${p.losses}負</span></div>
          <div class="pred-row"><span>直近平均終値</span><span>${p.recentAvg.toLocaleString()}玉</span></div>
          <div class="pred-row"><span>直近累積</span><span>${p.recentCumLoss.toLocaleString()}玉</span></div>
        </div>
        ${reasons.length > 0 ? `<div class="pred-reason">📌 ${reasons.join(' / ')}</div>` : ''}
      </div>`;
  }).join('');
}

// 翌日日付をタイトルに表示
(function() {
  const tomorrow = new Date(new Date(LAST_DATE).getTime() + 86400000);
  const mm = String(tomorrow.getMonth() + 1).padStart(2, '0');
  const dd = String(tomorrow.getDate()).padStart(2, '0');
  document.getElementById('predTitle').textContent =
    `台予測（${mm}/${dd} 翌日注目台）`;
})();

renderPrediction();
</script>
