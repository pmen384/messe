<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>メッセ三鷹 台予測履歴</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
    }
    h1 { font-size: 18px; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }

    .card {
      background: #1a1d2e; border: 1px solid #2a2d3e;
      border-radius: 12px; padding: 18px; margin-bottom: 20px;
    }
    .card h2 { font-size: 14px; color: #bbb; margin-bottom: 14px; font-weight: 600; }

    /* サマリー */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .summary-item {
      background: #0d0f1a; border-radius: 10px; padding: 14px;
      text-align: center;
    }
    .summary-label { font-size: 11px; color: #555; margin-bottom: 6px; }
    .summary-val { font-size: 24px; font-weight: 700; }
    .summary-val.good { color: #69F0AE; }
    .summary-val.bad  { color: #ff5252; }
    .summary-val.neutral { color: #ccc; }

    /* PDCA重み */
    .pdca-grid { display: flex; flex-direction: column; gap: 8px; }
    .pdca-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .pdca-label { width: 160px; color: #888; flex-shrink: 0; }
    .pdca-bar-wrap { flex: 1; height: 8px; background: #1e2235; border-radius: 4px; overflow: hidden; }
    .pdca-bar { height: 100%; border-radius: 4px; background: #3a4fd4; }
    .pdca-val { width: 50px; text-align: right; color: #ccc; font-weight: 700; }
    .pdca-note { font-size: 11px; color: #444; margin-top: 10px; line-height: 1.5; }

    /* 履歴テーブル */
    .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .history-table th {
      text-align: left; padding: 8px 10px; color: #555;
      border-bottom: 1px solid #2a2d3e; font-weight: 600; white-space: nowrap;
    }
    .history-table td {
      padding: 8px 10px; border-bottom: 1px solid #1a1d2a; vertical-align: top;
    }
    .history-table tr:hover td { background: #1e2130; }

    .pred-date { color: #888; white-space: nowrap; }
    .hot-units { display: flex; flex-wrap: wrap; gap: 4px; }
    .unit-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 10px; font-size: 11px;
      font-weight: 700; border: 1px solid #2e3148;
    }
    .unit-chip.hit  { border-color: #69F0AE44; color: #69F0AE; background: #69F0AE15; }
    .unit-chip.miss { border-color: #ff525244; color: #ff5252; background: #ff525215; }
    .unit-chip.pending { color: #666; }

    .result-val { font-weight: 700; white-space: nowrap; }
    .result-val.pos { color: #69F0AE; }
    .result-val.neg { color: #ff5252; }

    .accuracy-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700;
    }
    .accuracy-badge.high { background: #69F0AE20; color: #69F0AE; }
    .accuracy-badge.mid  { background: #FF980020; color: #ff9800; }
    .accuracy-badge.low  { background: #ff525220; color: #ff5252; }
    .accuracy-badge.pending { background: #2e314820; color: #555; }

    .trend-chart {
      display: flex; align-items: flex-end; gap: 4px;
      height: 60px; margin-top: 12px;
    }
    .trend-bar-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
    }
    .trend-bar {
      width: 100%; border-radius: 3px 3px 0 0;
      min-height: 2px;
    }
    .trend-label { font-size: 9px; color: #444; white-space: nowrap; }
  </style>
</head>
<body>

<h1>メッセ三鷹 — 台予測履歴</h1>
<p class="subtitle" id="subtitle">読み込み中...</p>

<div class="card" id="summaryCard">
  <h2>正確率サマリー</h2>
  <div class="summary-grid" id="summaryGrid"></div>
  <div class="trend-chart" id="trendChart"></div>
</div>

<div class="card">
  <h2>PDCA — スコア重み（現在）</h2>
  <div class="pdca-grid" id="pdcaGrid"></div>
  <p class="pdca-note">
    ※ 過去の予測結果を元に自動調整されます。データが5件未満の場合はデフォルト値を使用します。
  </p>
</div>

<div class="card">
  <h2>予測履歴</h2>
  <div style="overflow-x:auto">
    <table class="history-table">
      <thead>
        <tr>
          <th>予測日</th>
          <th>注目台 (上位3台)</th>
          <th>正解</th>
          <th>詳細（全9台）</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<script>
const PRED_DATA = [{"predDate":"2026-04-26","madeAt":"2026-04-25","weights":{"consecutiveLoss":20,"recentCumLoss":1,"avgDaily":1},"predictions":[{"unit":44,"score":150.3,"consecutiveLoss":3,"recentAvg":-4780,"recentCumLoss":-64920,"wins":2,"losses":5},{"unit":46,"score":102.7,"consecutiveLoss":1,"recentAvg":-7240,"recentCumLoss":-67120,"wins":2,"losses":5},{"unit":55,"score":97,"consecutiveLoss":1,"recentAvg":-9563,"recentCumLoss":-76960,"wins":1,"losses":6},{"unit":43,"score":96.3,"consecutiveLoss":0,"recentAvg":-6117,"recentCumLoss":-85860,"wins":2,"losses":5},{"unit":49,"score":95.8,"consecutiveLoss":0,"recentAvg":-8449,"recentCumLoss":-77970,"wins":2,"losses":5},{"unit":41,"score":83.2,"consecutiveLoss":2,"recentAvg":9374,"recentCumLoss":-43160,"wins":4,"losses":3},{"unit":51,"score":81.4,"consecutiveLoss":2,"recentAvg":120,"recentCumLoss":-41390,"wins":3,"losses":4},{"unit":45,"score":76,"consecutiveLoss":2,"recentAvg":5891,"recentCumLoss":-26570,"wins":2,"losses":5},{"unit":47,"score":63.5,"consecutiveLoss":1,"recentAvg":2620,"recentCumLoss":-42570,"wins":3,"losses":4}],"results":null}];

const DEFAULT_WEIGHTS = { consecutiveLoss: 20, recentCumLoss: 1.0, avgDaily: 1.0 };

// 最新エントリの重みを表示
function renderPdca() {
  const latest = [...PRED_DATA].reverse().find(e => e.weights);
  const w = latest ? latest.weights : DEFAULT_WEIGHTS;
  const max = Math.max(w.consecutiveLoss, w.recentCumLoss * 20, w.avgDaily * 10, 1);
  const items = [
    { label: '連続マイナス日数', key: 'consecutiveLoss', display: w.consecutiveLoss, bar: w.consecutiveLoss },
    { label: '直近累積赤字 (÷1000)', key: 'recentCumLoss', display: w.recentCumLoss, bar: w.recentCumLoss * 20 },
    { label: '全体平均終値 (÷500)', key: 'avgDaily', display: w.avgDaily, bar: w.avgDaily * 10 },
  ];
  const maxBar = Math.max(...items.map(i => i.bar), 1);
  document.getElementById('pdcaGrid').innerHTML = items.map(item => `
    <div class="pdca-row">
      <div class="pdca-label">${item.label}</div>
      <div class="pdca-bar-wrap">
        <div class="pdca-bar" style="width:${(item.bar/maxBar*100).toFixed(0)}%"></div>
      </div>
      <div class="pdca-val">${item.display}</div>
    </div>`).join('');
}

// 正確率計算
function calcAccuracyStats() {
  const completed = PRED_DATA.filter(e => e.results && Object.keys(e.results).length > 0);
  let totalHot = 0, hitHot = 0;
  const perEntry = [];
  for (const entry of completed) {
    const hot = entry.predictions.slice(0, 3);
    let hit = 0;
    for (const p of hot) {
      const r = entry.results[String(p.unit)];
      if (r !== undefined) { totalHot++; if (r > 0) { hitHot++; hit++; } }
    }
    perEntry.push({ date: entry.predDate, hit, total: hot.filter(p => entry.results[String(p.unit)] !== undefined).length });
  }
  return { totalHot, hitHot, completed: completed.length, perEntry };
}

function renderSummary() {
  const { totalHot, hitHot, completed, perEntry } = calcAccuracyStats();
  const acc = totalHot > 0 ? Math.round(hitHot / totalHot * 100) : null;
  const accClass = acc === null ? 'neutral' : acc >= 50 ? 'good' : acc >= 33 ? 'neutral' : 'bad';

  // 直近7件のトレンド
  const recent7 = perEntry.slice(-7);
  const recentHits = recent7.reduce((s, e) => s + e.hit, 0);
  const recentTotal = recent7.reduce((s, e) => s + e.total, 0);
  const recentAcc = recentTotal > 0 ? Math.round(recentHits / recentTotal * 100) : null;

  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-item">
      <div class="summary-label">総合正確率</div>
      <div class="summary-val ${accClass}">${acc !== null ? acc + '%' : '—'}</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">直近7日正確率</div>
      <div class="summary-val ${recentAcc !== null ? (recentAcc >= 50 ? 'good' : 'bad') : 'neutral'}">${recentAcc !== null ? recentAcc + '%' : '—'}</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">予測件数</div>
      <div class="summary-val neutral">${completed}</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">ホット的中数</div>
      <div class="summary-val neutral">${hitHot} / ${totalHot}</div>
    </div>`;

  document.getElementById('subtitle').textContent =
    `予測履歴: ${PRED_DATA.length}件 (結果あり: ${completed}件)`;

  // トレンドチャート
  if (perEntry.length > 0) {
    const chartData = perEntry.slice(-14);
    const maxPct = 100;
    document.getElementById('trendChart').innerHTML = chartData.map(e => {
      const pct = e.total > 0 ? Math.round(e.hit / e.total * 100) : 0;
      const color = pct >= 67 ? '#69F0AE' : pct >= 33 ? '#FF9800' : '#ff5252';
      const h = Math.max(4, Math.round(pct / maxPct * 54));
      return `<div class="trend-bar-wrap">
        <div class="trend-bar" style="height:${h}px;background:${color}"></div>
        <div class="trend-label">${e.date.slice(5)}</div>
      </div>`;
    }).join('');
  }
}

// 履歴テーブル
function renderHistory() {
  const rows = [...PRED_DATA].reverse().map(entry => {
    const hot = entry.predictions.slice(0, 3);
    const all9 = entry.predictions;
    const hasResults = entry.results && Object.keys(entry.results).length > 0;

    const hotChips = hot.map(p => {
      if (!hasResults) return `<span class="unit-chip pending">台${p.unit}</span>`;
      const r = entry.results[String(p.unit)];
      if (r === undefined) return `<span class="unit-chip pending">台${p.unit}</span>`;
      const isHit = r > 0;
      const sign = r >= 0 ? '+' : '';
      return `<span class="unit-chip ${isHit ? 'hit' : 'miss'}" title="${sign}${r.toLocaleString()}玉">台${p.unit} ${isHit ? '✓' : '✗'}</span>`;
    }).join('');

    let correctCount = '—';
    let badgeClass = 'pending';
    if (hasResults) {
      const withResult = hot.filter(p => entry.results[String(p.unit)] !== undefined);
      const hits = withResult.filter(p => entry.results[String(p.unit)] > 0).length;
      correctCount = `${hits}/${withResult.length}`;
      badgeClass = hits >= 2 ? 'high' : hits >= 1 ? 'mid' : 'low';
    }

    const detailItems = all9.map((p, i) => {
      if (!hasResults) return `台${p.unit}`;
      const r = entry.results[String(p.unit)];
      if (r === undefined) return `台${p.unit}`;
      const sign = r >= 0 ? '+' : '';
      const cls = r > 0 ? 'pos' : 'neg';
      const tier = i < 3 ? '🔥' : i < 6 ? '👀' : '❄️';
      return `<span class="result-val ${cls}">${tier}台${p.unit}: ${sign}${r.toLocaleString()}</span>`;
    }).join('　');

    return `<tr>
      <td class="pred-date">${entry.predDate}</td>
      <td><div class="hot-units">${hotChips}</div></td>
      <td><span class="accuracy-badge ${badgeClass}">${correctCount}</span></td>
      <td style="font-size:11px;color:#555;line-height:1.8">${detailItems}</td>
    </tr>`;
  }).join('');

  document.getElementById('historyBody').innerHTML = rows ||
    '<tr><td colspan="4" style="color:#444;padding:20px;text-align:center">まだデータがありません</td></tr>';
}

renderSummary();
renderPdca();
renderHistory();
</script>
</body>
</html>
